spring:
  application:
    name: notes
  datasource:
    url: jdbc:postgresql://localhost:5432/notes
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false
  web:
    error:
      include-message: always
  output:
    ansi:
      enabled: ALWAYS

app:
  cleanup:
    trash-retention-days: 30
    cron: "0 0 3 * * ?"

logging:
  level:
    com.example.notes: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.flywaydb: DEBUG

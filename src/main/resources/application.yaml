spring:
  application:
    name: notes
  
  datasource:
    url: jdbc:postgresql://localhost:5432/notes
    username:
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  web:
    error:
      include-message: always

  output:
    ansi:
      enabled: ALWAYS

app:
  cleanup:
    trash-retention-days: 30
    cron: "0 0 3 * * ?"

logging:
  level:
    com.example.notes: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE